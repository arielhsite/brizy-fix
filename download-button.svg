<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <style>
    .button-group {
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .button-rect {
      fill: #2271b1;
      rx: 12px;
      ry: 12px;
      transition: fill 0.2s ease, filter 0.2s ease;
      filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.1));
    }
    .button-text {
      fill: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-anchor: middle;
      pointer-events: none;
    }
    .button-group:hover {
      transform: translateY(-5px);
    }
    .button-group:hover .button-rect {
      fill: #135e96;
      filter: drop-shadow(0px 6px 12px rgba(0, 0, 0, 0.2));
    }
  </style>
  <g class="button-group" transform="translate(0, 5)">
    <rect class="button-rect" x="10" y="5" width="280" height="60" />
    <text class="button-text" x="150" y="41">Download Brizy Fix</text>
  </g>
</svg>
